<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridnflow – Mobile Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f7fa; color: #333; }
    header {
      background: #1E88E5;
      color: white;
      padding: 48px 24px;
      text-align: center;
    }
    header h1 { font-size: 2rem; margin-bottom: 8px; }
    header p { font-size: 1rem; opacity: 0.9; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 24px; }
    .app-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .app-card h2 { font-size: 1.3rem; color: #1E88E5; margin-bottom: 8px; }
    .app-card p { line-height: 1.6; color: #555; margin-bottom: 16px; }
    .app-card a {
      display: inline-block;
      background: #1E88E5;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .app-card a:hover { background: #1565C0; }
    footer {
      text-align: center;
      padding: 32px 24px;
      color: #999;
      font-size: 0.85rem;
    }
    footer a { color: #1E88E5; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Gridnflow</h1>
    <p>Mobile Apps für Android</p>
  </header>

  <div class="container">
    <div class="app-card">
      <h2>Feiertage DE – Brückentage &amp; Urlaub</h2>
      <p>
        Alle gesetzlichen Feiertage für alle 16 Bundesländer in Deutschland.
        Mit Brückentage-Rechner, Schulferien und persönlichem Urlaubsplaner.
      </p>
      <a href="https://play.google.com/store/apps/details?id=com.gridnflow.feiertage.kalender" target="_blank">
        Auf Google Play
      </a>
    </div>
  </div>

  <footer>
    <p>
      &copy; 2026 Gridnflow &nbsp;|&nbsp;
      <a href="/privacy-policy.html">Datenschutzerklärung</a> &nbsp;|&nbsp;
      <a href="mailto:gridnflow@gmail.com">gridnflow@gmail.com</a>
    </p>
  </footer>
</body>
</html>
